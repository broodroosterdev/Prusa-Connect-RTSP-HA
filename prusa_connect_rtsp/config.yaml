name: "Prusa Connect RTSP Camera"
version: "1.5.0"
slug: "prusa_connect_rtsp"
description: "Stream RTSP cameras to Prusa Connect for 3D printer monitoring"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
url: https://github.com/DariBer/Prusa-Connect-RTSP-HA
# image: ghcr.io/dariber/prusa-connect-rtsp-ha-{arch}
# ^ Uncomment after the docker-build workflow has published images to GHCR.
# With image: set, Supervisor pulls only and does NOT fall back to local build.
startup: application
boot: auto
init: false

options:
  cameras:
    - name: "Printer 1"
      rtsp_url: ""
      token: ""
      upload_interval: 5
      timelapse_enabled: false
      timelapse_save_interval: 30
      timelapse_fps: 24

schema:
  cameras:
    - name: str
      rtsp_url: url
      token: password
      fingerprint: "str?"
      upload_interval: "int(1,300)"
      timelapse_enabled: bool
      timelapse_save_interval: "int(10,3600)?"
      timelapse_fps: "int(1,60)?"

services:
  - mqtt:want

map:
  - share:rw
