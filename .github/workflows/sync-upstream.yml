name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2:00 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream main.py for reference
        run: |
          # main.py here has diverged significantly from upstream (multi-camera,
          # MQTT discovery, SIGTERM cleanup, etc.). We pull upstream into a side
          # file so the resulting PR is a diff for manual review, not a clobber.
          mkdir -p .upstream
          curl -sL https://raw.githubusercontent.com/Knopersikcuo/Prusa-Connect-RTSP/main/main.py -o .upstream/main.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: snapshot upstream Prusa-Connect-RTSP"
          title: "Upstream Prusa-Connect-RTSP snapshot for review"
          body: |
            Snapshot of upstream `main.py` placed under `.upstream/` for manual review.
            Apply changes by hand into `prusa_connect_rtsp/main.py` — the fork has diverged.

            Source: [Knopersikcuo/Prusa-Connect-RTSP](https://github.com/Knopersikcuo/Prusa-Connect-RTSP)
          branch: sync-upstream
          delete-branch: true
          labels: upstream-sync, automated
